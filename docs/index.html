<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noēsis</title>
  <link rel="icon" type="image/png" href="noesis-logo.png">
  <style>
    body {
      margin: 0;
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }
    p {
      font-size: 1.6em;
      opacity: 0.9;
      margin: 0.5em 0 0;
      z-index: 2;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .logo {
      width: 600px;
      max-width: 80vw;
      opacity: 0.92;
      margin-bottom: 1em;
      animation: fadeIn 2s ease-in-out;
      z-index: 2;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 0.92; transform: scale(1); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <img src="noesis-logo.png" alt="Noēsis Logo" class="logo">
  <p>The genesis of decentralized intelligence. Evolving. Ethical. Alive.</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        opacity: 0,
        targetOpacity: Math.random(),
        speed: 0.002 + Math.random() * 0.003,
        connections: []
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      for (let i = 0; i < stars.length; i++) {
        let star = stars[i];
        if (star.opacity < star.targetOpacity) {
          star.opacity += star.speed;
        }
        ctx.beginPath();
        ctx.arc(star.x, star.y, 1.5, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        ctx.fill();
      }

      // Connect stars
      for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
          const a = stars[i], b = stars[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100 && a.opacity > 0.2 && b.opacity > 0.2) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(255, 255, 255, 0.05)`;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
